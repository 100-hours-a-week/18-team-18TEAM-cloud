name: terraform-scaffold

on:
  pull_request:
    paths:
      - "terraform-new/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: remote-state
            directory: terraform-new/infra/terraform/bootstrap/remote-state
            varfile: terraform.tfvars.example
          - name: dev-prod-shared-cluster
            directory: terraform-new/infra/terraform/environments/dev-prod-shared-cluster
            varfile: terraform.tfvars.example

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform-new

      - name: Terraform init (backend disabled)
        working-directory: ${{ matrix.directory }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: ${{ matrix.directory }}
        run: terraform validate

      - name: Configure AWS credentials
        if: ${{ secrets.AWS_TERRAFORM_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-northeast-2' }}

      - name: Terraform plan
        if: ${{ secrets.AWS_TERRAFORM_ROLE_ARN != '' }}
        working-directory: ${{ matrix.directory }}
        run: terraform plan -input=false -lock=false -var-file=${{ matrix.varfile }}

      - name: Plan skipped notice
        if: ${{ secrets.AWS_TERRAFORM_ROLE_ARN == '' }}
        run: echo "AWS_TERRAFORM_ROLE_ARN secret is not set. terraform plan step was skipped."
