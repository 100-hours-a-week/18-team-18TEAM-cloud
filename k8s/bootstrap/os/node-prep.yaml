#cloud-config
package_update: true
package_upgrade: false

write_files:
  - path: /etc/modules-load.d/k8s.conf
    permissions: "0644"
    content: |
      overlay
      br_netfilter
  - path: /etc/sysctl.d/99-kubernetes-cri.conf
    permissions: "0644"
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1
  - path: /usr/local/bin/k8s-node-prep.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -eux

      swapoff -a
      sudo sed -ri '/\sswap\s/s/^#?/#/' /etc/fstab

      sudo modprobe overlay
      sudo modprobe br_netfilter
      sudo sysctl --system

      if command -v apt-get >/dev/null 2>&1; then
        sudo apt-get update
        sudo apt-get install -y apt-transport-https ca-certificates curl gpg
      fi
  - path: /etc/bizkit/node-bootstrap-notes.txt
    permissions: "0644"
    content: |
      Worker node labels/taints are applied at kubeadm join time.
      Use bootstrap/kubeadm/join-worker.yaml profiles:
      - app-pool: nodepool=app-pool
      - ai-serving-pool: nodepool=ai-serving-pool
      - ai-model dedicated: nodepool=ai-serving-pool,dedicated=model + taint dedicated=model:NoSchedule
      - system-pool: nodepool=system-pool
      Do not patch deployment selectors to match unlabeled nodes.

runcmd:
  - /usr/local/bin/k8s-node-prep.sh
