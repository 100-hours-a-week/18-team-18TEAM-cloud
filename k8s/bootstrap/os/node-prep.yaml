# 이 파일은 kubeadm 설치 전에 노드 OS에서 맞춰야 할 기준을 YAML로 정리한 문서다.
# 실제 적용은 cloud-init, Ansible, 수동 스크립트 중 팀이 고른 방식으로 옮긴다.

apiVersion: bootstrap.bizkit.io/v1alpha1
kind: NodePreparationProfile
metadata:
  name: bizkit-node-prep
spec:
  swap:
    disabled: true # kubelet 안정성을 위해 swap을 끈다
  kernelModules:
    - overlay # containerd overlayfs 사용
    - br_netfilter # Kubernetes 네트워크 브리지 트래픽 처리
  sysctl:
    net.bridge.bridge-nf-call-iptables: 1 # 브리지 트래픽을 iptables 규칙으로 본다
    net.bridge.bridge-nf-call-ip6tables: 1 # IPv6 브리지 트래픽도 규칙 적용
    net.ipv4.ip_forward: 1 # pod/service 라우팅을 위해 IP forwarding 활성화
  kubeReserved:
    cpu: 150m # 설계 문서 4.3 기준
    memory: 400Mi # 설계 문서 4.3 기준
    ephemeralStorage: 1Gi # 설계 문서 4.3 기준
  systemReserved:
    cpu: 150m # 설계 문서 4.3 기준
    memory: 600Mi # 설계 문서 4.3 기준
    ephemeralStorage: 1Gi # 설계 문서 4.3 기준
  evictionHard:
    - memory.available<500Mi # 메모리 여유가 너무 작아지면 파드 축출 시작
    - nodefs.available<10% # 노드 파일시스템 여유 부족 기준
    - imagefs.available<15% # 이미지 저장소 여유 부족 기준
    - nodefs.inodesFree<5% # inode 고갈 기준
  packages:
    - containerd # 컨테이너 런타임
    - kubelet # 노드 에이전트
    - kubeadm # 클러스터 bootstrap 도구
    - kubectl # 운영 확인용 CLI
  notes:
    - "1차 구축은 stateless 워크로드 중심이므로 hostPath와 로컬 디스크 의존 설계를 금지한다."
    - "system-pool 안정성을 위해 reserved를 0으로 두지 않는다."
    - "kube-proxy는 iptables 모드 기준으로 시작한다. 별도 KubeProxyConfiguration이 필요하면 이후 분리한다."
