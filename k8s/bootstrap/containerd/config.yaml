apiVersion: v1
kind: ConfigMap
metadata:
  name: containerd-config-template
  namespace: kube-system
data:
  config.toml: |
    version = 2

    [plugins]
      [plugins."io.containerd.grpc.v1.cri"]
        sandbox_image = "registry.k8s.io/pause:3.10"

        [plugins."io.containerd.grpc.v1.cri".containerd]
          default_runtime_name = "runc"

          [plugins."io.containerd.grpc.v1.cri".containerd.runtimes]
            [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
              runtime_type = "io.containerd.runc.v2"

              [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options]
                SystemdCgroup = true

        [plugins."io.containerd.grpc.v1.cri".registry]
          config_path = "/etc/containerd/certs.d"

  apply.sh: |
    #!/usr/bin/env bash
    set -eu

    sudo mkdir -p /etc/containerd
    sudo containerd config default | sudo tee /etc/containerd/config.toml >/dev/null
    sudo sed -i.bak 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml
    sudo sed -i.bak 's#sandbox_image = \".*\"#sandbox_image = \"registry.k8s.io/pause:3.10\"#' /etc/containerd/config.toml
    sudo systemctl restart containerd
    sudo systemctl enable containerd
