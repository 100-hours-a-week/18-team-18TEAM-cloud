apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bizkit-be
  namespace: system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: bizkit-prod
  source:
    repoURL: https://github.com/100-hours-a-week/18-team-18TEAM-cloud.git
    targetRevision: main
    path: k8s/clusters/be
  destination:
    server: https://kubernetes.default.svc
    namespace: system
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /metadata/annotations/force-sync
        - /metadata/annotations/reconcile-time
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
