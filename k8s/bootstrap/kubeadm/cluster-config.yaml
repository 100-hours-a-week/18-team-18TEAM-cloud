apiVersion: kubeadm.k8s.io/v1beta4 # kubeadm이 이 파일을 어떤 스키마로 읽을지 정하는 버전
kind: ClusterConfiguration # 클러스터 전체 공통 설정을 담는 문서 타입

clusterName: bizkit-prod-cluster # 클러스터 이름
kubernetesVersion: v1.33.9 # 설치할 Kubernetes 버전
controlPlaneEndpoint: "k8s-api.prod.bizkit.private:6443" # control plane 공통 진입점. kube-apiserver 앞단의 고정 DNS 또는 VIP 주소

networking:
  dnsDomain: cluster.local # 클러스터 내부 서비스 DNS suffix
  serviceSubnet: 10.96.0.0/12 # kubeadm 설계 문서 기준 기본 Service CIDR. VPC(10.0.0.0/18 계열)와 겹치지 않도록 유지
  podSubnet: 10.244.0.0/16 # Calico 시작안 기준 Pod CIDR. kubeadm runbook과 동일한 시작값 사용

apiServer:
  certSANs: # API server 인증서가 유효해야 하는 접속 주소 목록
    - k8s-api.prod.bizkit.private # controlPlaneEndpoint DNS
    # TODO(B): cp-1의 실제 private IP 추가

controllerManager: # kube-controller-manager 프로세스 옵션. 1차 구축에서는 기본값 사용
  extraArgs: []

scheduler: # kube-scheduler 프로세스 옵션. 1차 구축에서는 기본값 사용
  extraArgs: []

etcd:
  local:
    dataDir: "/var/lib/etcd" # 로컬 etcd 데이터 저장 경로
    extraArgs: [] # 1차 구축에서는 기본값 사용
  # external: # 외부 etcd 클러스터를 별도로 운영할 때만 사용
  #   endpoints:
  #     - # "DNS또는IP:2379" 형식
  #   caFile: 
  #   certFile: 
  #   keyFile: 

dns: # kubeadm이 CoreDNS를 설치할지 결정
  disabled: false

proxy: # kubeadm이 kube-proxy를 설치할지 결정
  disabled: false
