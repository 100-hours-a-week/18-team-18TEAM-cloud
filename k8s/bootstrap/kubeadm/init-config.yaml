apiVersion: kubeadm.k8s.io/v1beta4 # kubeadm이 이 파일을 어떤 스키마로 해석할지 정하는 버전
kind: InitConfiguration # kubeadm init 시 첫 control plane 노드의 로컬 초기화 값을 담는 문서 타입

bootstrapTokens:
  - token: "" # 다른 노드가 이 클러스터에 join할 때 쓰는 bootstrap token. 1차 cp-1 단독 init에서는 kubeadm 자동 생성으로 대신할 수도 있음
    description: "bizkit bootstrap token" # 토큰이 어떤 용도로 발급됐는지 구분하기 위한 설명
    ttl: "24h" # 토큰이 살아있는 시간. 지나면 다시 발급해야 함
    usages:
      - authentication # join하는 노드가 자신을 인증할 때 사용
      - signing # kubeadm이 필요한 인증 정보를 서명할 때 사용
    groups:
      - "system:bootstrappers:kubeadm:default-node-token" # bootstrap token이 속하는 기본 권한 그룹

nodeRegistration:
  name: "" # 이 노드가 Kubernetes Node 객체로 등록될 때 사용할 이름. 비우면 OS hostname을 사용
  criSocket: "unix:///var/run/containerd/containerd.sock" # kubelet이 사용할 컨테이너 런타임 소켓 경로. 우리는 containerd 기준
  taints:
    - key: "node-role.kubernetes.io/control-plane" # control plane 노드라는 의미의 기본 taint key
      effect: "NoSchedule" # 일반 앱 파드가 기본적으로 control plane에 스케줄되지 않게 막음
  kubeletExtraArgs:
    - name: "node-ip"
      value: "" # TODO(B): kubelet이 이 노드의 대표 IP로 사용할 cp-1 실제 private IP
    - name: "kube-reserved"
      value: "cpu=150m,memory=400Mi,ephemeral-storage=1Gi" # kubelet, container runtime 같은 Kubernetes 구성요소가 먼저 써야 할 자원을 예약
    - name: "system-reserved"
      value: "cpu=150m,memory=600Mi,ephemeral-storage=1Gi" # OS와 systemd 같은 노드 기본 프로세스가 쓸 자원을 예약
    - name: "eviction-hard"
      value: "memory.available<500Mi,nodefs.available<10%,imagefs.available<15%,nodefs.inodesFree<5%" # 노드 여유 자원이 이 기준 아래로 내려가면 kubelet이 파드를 강제 축출
    # - name: "node-labels"
    #   value: "" # TODO(A): node pool 라벨 체계가 확정되면 worker 노드 등록 방식에 맞춰 사용
    # - name: "register-with-taints"
    #   value: "" # TODO(A): ai-serving-pool, system-pool 전용 taint를 kubelet 등록 시점에 줄지 결정되면 사용
  ignorePreflightErrors: [] # kubeadm 사전 점검에서 예외로 넘길 항목 목록. 특별한 사유가 없으면 비워둠
  imagePullPolicy: "IfNotPresent" # 필요한 이미지가 로컬에 없을 때만 가져오도록 하는 정책
  imagePullSerial: true # 이미지를 한 번에 병렬로 받지 않고 순서대로 받아 초기 부하를 줄임

localAPIEndpoint:
  advertiseAddress: "" # TODO(B): 이 control plane 노드가 다른 노드에게 자신을 API server 주소로 알릴 cp-1 실제 private IP
  bindPort: 6443 # kube-apiserver 프로세스가 이 노드에서 열 포트

certificateKey: "" # 추가 control plane 노드가 인증서 묶음을 안전하게 받아갈 때 쓰는 키. 1차 단일 control plane 시작에서는 비워둘 수 있음

skipPhases: [] # kubeadm init 단계 중 의도적으로 생략할 단계가 있을 때만 사용

# patches:
#   directory: "" # kube-apiserver, controller-manager 같은 static pod 매니페스트를 patch할 파일 위치

timeouts:
  controlPlaneComponentHealthCheck: "4m0s" # apiserver, controller-manager, scheduler가 정상 기동할 때까지 기다리는 시간
  kubeletHealthCheck: "4m0s" # kubelet이 정상 응답 상태가 될 때까지 기다리는 시간
  kubernetesAPICall: "1m0s" # kubeadm이 kube-apiserver와 통신할 때 쓰는 요청 타임아웃
  etcdAPICall: "2m0s" # kubeadm이 etcd 상태를 확인할 때 쓰는 요청 타임아웃
  tlsBootstrap: "5m0s" # 노드가 TLS bootstrap 절차를 마칠 때까지 기다리는 시간
  discovery: "5m0s" # join 대상 노드가 control plane 정보를 찾는 데 허용할 시간
