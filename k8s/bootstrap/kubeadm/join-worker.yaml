apiVersion: kubeadm.k8s.io/v1beta4 # kubeadm 설정 API 버전
kind: JoinConfiguration # worker 노드가 기존 클러스터에 참여할 때 사용하는 문서 타입

discovery:
  bootstrapToken:
    apiServerEndpoint: "k8s-api.bizkit.internal:6443" # control plane 공통 진입점. cluster-config의 controlPlaneEndpoint와 같은 값
    token: "" # TODO(B): kubeadm init 후 발급된 bootstrap token
    caCertHashes:
      - "" # TODO(B): discovery-token-ca-cert-hash 값. sha256:... 형식

nodeRegistration:
  name: "" # worker 노드가 Kubernetes Node 객체로 등록될 때 사용할 이름. 비우면 OS hostname 사용
  criSocket: "unix:///var/run/crio/crio.sock" # kubelet이 사용할 CRI-O 소켓 경로
  kubeletExtraArgs:
    - name: "node-ip"
      value: "" # TODO(B): 이 worker 노드의 실제 private IP
    # - name: "node-labels"
    #   value: "" # TODO(A): app-pool / ai-serving-pool / system-pool 라벨 규칙이 확정되면 입력
    # - name: "register-with-taints"
    #   value: "" # TODO(A): 특정 pool 전용 taint를 노드 등록 시점부터 강제할 때 사용
  ignorePreflightErrors: [] # 특별히 무시할 사전 점검 에러가 없으면 빈 배열 유지
  imagePullPolicy: "IfNotPresent" # 필요한 이미지가 로컬에 없을 때만 내려받음
  imagePullSerial: true # 초기 이미지 pull 부하를 줄이기 위해 순차 pull 유지
