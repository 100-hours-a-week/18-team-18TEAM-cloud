# KEDA는 AI Worker처럼 backlog 기반으로 스케일해야 하는 워크로드를 위한 확장기다.
# 1차 도입에서는 AI Worker만 우선 대상이며, Redis Streams scaler를 사용할 계획이다.

apiVersion: addon.bizkit.io/v1alpha1
kind: AddonInstallationPlan
metadata:
  name: keda
spec:
  namespace: keda
  installOrder: 3 # metrics-server와 기본 autoscaling 기반이 준비된 뒤 설치
  owner: B
  mode: vendor-manifest
  replicas: 1
  priorityClassName: bizkit-system-critical
  placement:
    pool: system-pool
  imageSet:
    operator:
      repository: ghcr.io/kedacore/keda
      tag: TODO_VERSION # TODO(B): 검증한 KEDA 버전으로 pin
    metricsAdapter:
      repository: ghcr.io/kedacore/keda-metrics-apiserver
      tag: TODO_VERSION # TODO(B): operator와 맞는 버전으로 pin
  todo:
    - "TODO(B): vendored manifest에 namespace, CRD, operator deployment, metrics adapter 반영"
    - "TODO(B): Redis Streams scaler 버전 호환성과 addressFromEnv 동작 여부 검증"
  notes:
    - "AI Worker는 queue 적체 기반 자동 확장이 목표라 HPA보다 KEDA가 우선이다."
    - "KEDA 본체는 platform에 두고, 실제 ScaledObject는 apps/ai-worker/hpa.yaml에서 관리한다."
