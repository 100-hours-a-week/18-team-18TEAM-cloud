# Cluster Autoscaler는 worker node pool 수를 자동 조절한다.
# 1차 설계 기준 node group은 app-pool, ai-serving-pool, system-pool이다.

apiVersion: addon.bizkit.io/v1alpha1
kind: AddonInstallationPlan
metadata:
  name: cluster-autoscaler
spec:
  namespace: kube-system
  installOrder: 3 # node pool min/max와 태그 기준이 확정된 뒤 설치
  owner: B
  mode: vendor-manifest
  replicas: 1
  priorityClassName: bizkit-system-critical
  placement:
    pool: system-pool
  image:
    repository: registry.k8s.io/autoscaling/cluster-autoscaler
    tag: TODO_VERSION # TODO(B): 클러스터 버전과 맞는 autoscaler 버전으로 pin
  provider: aws
  nodeGroups:
    - name: app-pool
      min: 2
      max: 5
    - name: ai-serving-pool
      min: 1
      max: 4
    - name: system-pool
      min: 1
      max: 2
  todo:
    - "TODO(B): 실제 ASG/NodeGroup auto-discovery tag 이름 확정"
    - "TODO(B): AWS region, IAM 권한, scale-down 옵션을 실제 manifest에 반영"
  notes:
    - "app-pool은 온라인 트래픽 수용이므로 min 2를 유지한다."
    - "system-pool은 addon 안정성을 위해 min 1을 유지한다."
