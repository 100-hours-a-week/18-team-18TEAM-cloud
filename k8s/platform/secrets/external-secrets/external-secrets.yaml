# External Secrets는 앱 매니페스트가 직접 Secret 값을 들고 있지 않게 하기 위한 공통 기준이다.
# 1차 구축에서는 stateless 앱(BE, AI Worker, AI Model)이 외부 secret store에서 env를 끌어오는 기준만 먼저 잡는다.

apiVersion: addon.bizkit.io/v1alpha1
kind: AddonInstallationPlan
metadata:
  name: external-secrets
spec:
  namespace: external-secrets
  installOrder: 2 # 앱 Deployment보다 먼저 준비되어야 ExternalSecret이 동작한다
  owner: B
  mode: vendor-manifest
  replicas: 1
  priorityClassName: bizkit-system-critical
  placement:
    pool: system-pool
  image:
    repository: ghcr.io/external-secrets/external-secrets
    tag: TODO_VERSION # TODO(B): 검증한 external-secrets 버전으로 pin
  clusterSecretStore:
    name: aws-secretsmanager
    provider: aws-secrets-manager
    region: TODO_AWS_REGION # TODO(B): 실제 운영 region 반영
    authMode: TODO_AUTH_MODE # TODO(B): access key secretRef 또는 pod IAM 방식 확정
  todo:
    - "TODO(B): vendored manifest에 namespace, CRD, operator deployment, ClusterSecretStore 반영"
    - "TODO(B): 앱별 외부 secret key naming rule 확정"
  notes:
    - "앱 Deployment는 envFrom secretRef만 보고, 실제 값 주입은 ExternalSecret이 맡는다."
    - "1차 범위는 stateless 앱만 대상이라 stateful 스토리지 secret은 여기서 다루지 않는다."
