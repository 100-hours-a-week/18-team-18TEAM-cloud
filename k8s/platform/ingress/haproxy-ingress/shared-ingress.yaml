apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bizkit-ingress
  namespace: prod-system
  labels:
    app.kubernetes.io/name: bizkit-ingress
    app.kubernetes.io/part-of: bizkit
    app.kubernetes.io/component: ingress
  annotations:
    external-dns.alpha.kubernetes.io/hostname: cardcaro.com,dev.cardcaro.com
spec:
  ingressClassName: haproxy
  rules:
    - host: dev.cardcaro.com
      http:
        paths:
          - path: /api/ws
            pathType: Prefix
            backend:
              service:
                name: be-dev-proxy
                port:
                  number: 8080
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: be-dev-proxy
                port:
                  number: 8080
          - path: /ai
            pathType: Prefix
            backend:
              service:
                name: ai-api-dev-proxy
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fe-dev-proxy
                port:
                  number: 3000
    - host: cardcaro.com
      http:
        paths:
          - path: /api/ws
            pathType: Prefix
            backend:
              service:
                name: be-prod-proxy
                port:
                  number: 8080
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: be-prod-proxy
                port:
                  number: 8080
          - path: /ai
            pathType: Prefix
            backend:
              service:
                name: ai-api-prod-proxy
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fe-prod-proxy
                port:
                  number: 3000
