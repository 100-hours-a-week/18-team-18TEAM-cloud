apiVersion: v1
kind: ConfigMap
metadata:
  name: external-secrets-helm-baseline
  namespace: system
  labels:
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/part-of: bizkit
    app.kubernetes.io/component: system
data:
  install_mode: "helm"
  chart_name: "external-secrets/external-secrets"
  chart_version: "1.3.1"
  release_name: "external-secrets"
  target_namespace: "system"
  controller_service_account: "external-secrets"
  notes: |
    External Secrets controller 설치는 Helm 기준으로 관리한다.
    실제 설치는 control plane 노드에서 helm upgrade --install 로 수행한다.
    ClusterSecretStore, vault-ca, 앱 ExternalSecret 은 기존 YAML/Kustomize로 유지한다.
