apiVersion: v1
kind: ConfigMap
metadata:
  name: external-secrets-install-baseline
  namespace: prod-system
  labels:
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/part-of: bizkit
    app.kubernetes.io/component: system
data:
  controller: "external-secrets"
  target_namespace: "prod-system"
  priorityClassName: "bizkit-system-critical"
  secret_store_mode: "cluster-secret-store"
  secret_store_name: "bizkit-cluster-secret-store"
  auth_model: "controller-centric"
  controller_service_account: "external-secrets"
  controller_namespace: "prod-system"
  notes: |
    현재 저장소에는 external-secrets CRD/operator bundle이 vendored 되어 있지 않다.
    이 파일은 1차 운영 기준을 고정하기 위한 baseline manifest다.
    실제 적용 시에는 operator, webhook, cert-controller와 CRD를 함께 반입해야 한다.
    현재 기준에서 prod 클러스터의 external-secrets controller는 dev/prod 경로를 함께 읽고,
    staging은 이후 별도 클러스터 controller 기준으로 분리한다.
