apiVersion: v1
kind: ConfigMap
metadata:
  name: calico-install-baseline
  namespace: prod-system
  labels:
    app.kubernetes.io/name: calico
    app.kubernetes.io/part-of: bizkit
    app.kubernetes.io/component: networking
data:
  cni: "calico"
  dataplane: "standard-linux"
  encapsulation: "vxlan"
  vxlanMode: "CrossSubnet"
  bgp: "disabled-initial"
  wireguard: "disabled-initial"
  podCIDR: "10.244.0.0/16"
  notes: |
    현재 저장소에는 upstream Calico operator/manifest bundle이 vendored 되어 있지 않다.
    이 파일은 1차 설치 기준을 고정하기 위한 baseline manifest다.
    실제 적용 시에는 Calico operator 또는 공식 manifest를 같은 값으로 맞춰 반입해야 한다.
