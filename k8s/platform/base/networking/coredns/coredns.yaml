apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-runtime-baseline
  namespace: system
  labels:
    app.kubernetes.io/name: coredns
    app.kubernetes.io/part-of: bizkit
    app.kubernetes.io/component: dns
data:
  replicas: "2"
  request_cpu: "100m"
  request_memory: "170Mi"
  limit_cpu: "300m"
  limit_memory: "300Mi"
  priorityClassName: "bizkit-system-critical"
  notes: |
    kubeadm 기본 CoreDNS를 완전히 대체할지, kube-system 기본 설치본을 patch할지는 아직 정해지지 않았다.
    현재 파일은 운영 baseline을 고정한다.
    - 최소 replica 2
    - system-pool 우선
    - anti-affinity 권장
