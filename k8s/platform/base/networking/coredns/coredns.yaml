apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-runtime-baseline
  namespace: system
  labels:
    app.kubernetes.io/name: coredns
    app.kubernetes.io/part-of: bizkit
    app.kubernetes.io/component: dns
data:
  replicas: "2"
  request_cpu: "100m"
  request_memory: "70Mi"
  limit_cpu: "300m"
  limit_memory: "170Mi"
  priorityClassName: "bizkit-system-critical"
  notes: |
    실제 운영 Deployment는 runtime-deployment.yaml에 선언한다.
    현재 파일은 운영 baseline을 고정한다.
    - 최소 replica 2
    - system node 1개 + dns-role=fallback(app-1) 1개 배치
    - anti-affinity 유지
