apiVersion: v1
kind: ConfigMap
metadata:
  name: nodelocal-dns-runtime-baseline
  namespace: system
  labels:
    app.kubernetes.io/name: nodelocal-dns
    app.kubernetes.io/part-of: bizkit
    app.kubernetes.io/component: dns
data:
  local_ip: "169.254.20.10"
  kube_dns_service_ip: "10.96.0.10"
  request_cpu: "50m"
  request_memory: "64Mi"
  limit_cpu: "200m"
  limit_memory: "128Mi"
  notes: |
    실제 DaemonSet은 runtime-daemonset.yaml에 선언한다.
    NodeLocal DNSCache는 DaemonSet 기준으로 모든 worker node에 1개씩 배치한다.
    control-plane은 제외하고, system taint는 toleration으로 수용한다.
