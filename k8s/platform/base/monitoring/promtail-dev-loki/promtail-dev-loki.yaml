apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-dev-loki
  namespace: monitoring
  labels:
    app.kubernetes.io/name: promtail-dev-loki
    app.kubernetes.io/part-of: bizkit
    app.kubernetes.io/component: monitoring-log-collector
data:
  promtail.yml: |
    server:
      http_listen_port: 9081
      grpc_listen_port: 0

    positions:
      filename: /var/lib/promtail-dev-loki/positions.yaml

    clients:
      - url: http://10.0.66.230:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods-dev-loki
        pipeline_stages:
          - cri: {}
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - action: replace
            source_labels:
              - __meta_kubernetes_pod_node_name
            target_label: __host__
          - action: keep
            source_labels:
              - __meta_kubernetes_namespace
            regex: dev|system
          - action: replace
            replacement: bizkit-prod-cluster
            target_label: cluster
          - action: replace
            source_labels:
              - __meta_kubernetes_namespace
            target_label: namespace
          - action: replace
            source_labels:
              - __meta_kubernetes_pod_name
            target_label: pod
          - action: replace
            source_labels:
              - __meta_kubernetes_pod_container_name
            target_label: container
          - action: replace
            source_labels:
              - __meta_kubernetes_pod_node_name
            target_label: node_name
          - action: replace
            source_labels:
              - __meta_kubernetes_pod_label_environment
            target_label: environment
          - action: replace
            source_labels:
              - __meta_kubernetes_pod_label_app_kubernetes_io_part_of
            target_label: app
          - action: replace
            source_labels:
              - __meta_kubernetes_pod_label_app_kubernetes_io_name
            target_label: service
          - action: replace
            replacement: dev
            target_label: loki_target
          - action: replace
            source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            separator: /
            replacement: /var/log/pods/*$1/*.log
            target_label: __path__
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail-dev-loki
  namespace: monitoring
  labels:
    app.kubernetes.io/name: promtail-dev-loki
    app.kubernetes.io/part-of: bizkit
    app.kubernetes.io/component: monitoring-log-collector
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: promtail-dev-loki
      app.kubernetes.io/component: monitoring-log-collector
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: promtail-dev-loki
        app.kubernetes.io/part-of: bizkit
        app.kubernetes.io/component: monitoring-log-collector
        environment: prod
    spec:
      serviceAccountName: promtail
      priorityClassName: bizkit-system-critical
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      containers:
        - name: promtail
          image: docker.io/grafana/promtail:2.9.2
          imagePullPolicy: IfNotPresent
          args:
            - -config.file=/etc/promtail/promtail.yml
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: http-metrics
              containerPort: 9081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /ready
              port: http-metrics
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: http-metrics
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: false
            runAsUser: 0
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
              readOnly: true
            - name: positions
              mountPath: /var/lib/promtail-dev-loki
            - name: pods
              mountPath: /var/log/pods
              readOnly: true
            - name: containers
              mountPath: /var/log/containers
              readOnly: true
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: config
          configMap:
            name: promtail-dev-loki
        - name: positions
          hostPath:
            path: /var/lib/promtail-dev-loki
            type: DirectoryOrCreate
        - name: pods
          hostPath:
            path: /var/log/pods
        - name: containers
          hostPath:
            path: /var/log/containers
