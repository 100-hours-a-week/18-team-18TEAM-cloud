apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: haproxy
spec:
  controller: haproxy-ingress.github.io/controller
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: haproxy-ingress
  namespace: prod-system
  labels:
    app.kubernetes.io/name: haproxy-ingress
    app.kubernetes.io/part-of: bizkit
    app.kubernetes.io/component: ingress
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: haproxy-ingress
rules:
  - apiGroups: [""]
    resources: ["configmaps", "endpoints", "nodes", "pods", "secrets", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "ingressclasses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses/status"]
    verbs: ["update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: haproxy-ingress
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: haproxy-ingress
subjects:
  - kind: ServiceAccount
    name: haproxy-ingress
    namespace: prod-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: haproxy-ingress
  namespace: prod-system
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: haproxy-ingress
  namespace: prod-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: haproxy-ingress
subjects:
  - kind: ServiceAccount
    name: haproxy-ingress
    namespace: prod-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: haproxy-ingress
  namespace: prod-system
  labels:
    app.kubernetes.io/name: haproxy-ingress
    app.kubernetes.io/part-of: bizkit
    app.kubernetes.io/component: ingress
data:
  use-forwarded-proto: "true"
  timeout-client: "300s"
  timeout-client-fin: "300s"
  timeout-stop: "10m"
---
apiVersion: v1
kind: Service
metadata:
  name: haproxy-ingress
  namespace: prod-system
  labels:
    app.kubernetes.io/name: haproxy-ingress
    app.kubernetes.io/part-of: bizkit
    app.kubernetes.io/component: ingress
spec:
  type: NodePort
  externalTrafficPolicy: Local
  selector:
    app.kubernetes.io/name: haproxy-ingress
    app.kubernetes.io/component: ingress
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
      nodePort: 30080
    - name: https
      port: 443
      targetPort: https
      protocol: TCP
      nodePort: 30443
    - name: healthz
      port: 10254
      targetPort: healthz
      protocol: TCP
      nodePort: 31024
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: haproxy-ingress
  namespace: prod-system
  labels:
    app.kubernetes.io/name: haproxy-ingress
    app.kubernetes.io/part-of: bizkit
    app.kubernetes.io/component: ingress
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: haproxy-ingress
      app.kubernetes.io/component: ingress
  template:
    metadata:
      labels:
        app.kubernetes.io/name: haproxy-ingress
        app.kubernetes.io/part-of: bizkit
        app.kubernetes.io/component: ingress
        environment: prod
    spec:
      serviceAccountName: haproxy-ingress
      priorityClassName: bizkit-system-critical
      terminationGracePeriodSeconds: 60
      containers:
        - name: controller
          image: quay.io/jcmoraisjr/haproxy-ingress:v0.15.0
          imagePullPolicy: IfNotPresent
          args:
            - --configmap=prod-system/haproxy-ingress
            - --ingress-class=haproxy
            - --publish-service=prod-system/haproxy-ingress
            - --disable-external-name=false
            - --track-old-instances
            - --watch-ingress-without-class=false
            - --election-id=haproxy-ingress-leader
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP
            - name: healthz
              containerPort: 10254
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 99
      securityContext:
        seccompProfile:
          type: RuntimeDefault
