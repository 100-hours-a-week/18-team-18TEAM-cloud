apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ai-api-secret
  namespace: prod-ai-api
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bizkit-cluster-secret-store
  target:
    name: ai-api-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: prod/ai-api
