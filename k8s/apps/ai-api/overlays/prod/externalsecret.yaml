apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ai-api-secret
  namespace: prod-ai-api
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bizkit-cluster-secret-store
  target:
    name: ai-api-secret
    creationPolicy: Owner
  data:
    - secretKey: APP_ENV
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: prod/ai-api
        property: APP_ENV
    - secretKey: VLLM_BASE_URL
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: prod/ai-api
        property: VLLM_BASE_URL
    - secretKey: VLM_BASE_URL
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: prod/ai-api
        property: VLM_BASE_URL
    - secretKey: RUNPOD_API_KEY
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: prod/ai-api
        property: RUNPOD_API_KEY
    - secretKey: GITHUB_TOKEN
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: prod/ai-api
        property: GITHUB_TOKEN
    - secretKey: TAVILY_API_KEY
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: prod/ai-api
        property: TAVILY_API_KEY
    - secretKey: TAVILY_API_KEY_2
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: prod/ai-api
        property: TAVILY_API_KEY_2
    - secretKey: RUNPOD_ENDPOINT_ID
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: prod/ai-api
        property: RUNPOD_ENDPOINT_ID
    - secretKey: REDIS_URL
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: prod/ai-api
        property: REDIS_URL
    - secretKey: EMBEDDING_SERVICE_URL
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: prod/ai-api
        property: EMBEDDING_SERVICE_URL
    - secretKey: MILVUS_URI
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: prod/ai-api
        property: MILVUS_URI
    - secretKey: MILVUS_TOKEN
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: prod/ai-api
        property: MILVUS_TOKEN
