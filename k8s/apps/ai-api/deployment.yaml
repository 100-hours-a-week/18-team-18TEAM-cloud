apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-api
  namespace: prod-ai-api
  labels:
    app.kubernetes.io/name: ai-api
    app.kubernetes.io/part-of: bizkit
    app.kubernetes.io/component: ai-api
    environment: prod
    tier: app
    network-role: internal-api
  annotations:
    bizkit.io/git-sha: REPLACE_ME_GIT_SHA
    bizkit.io/deployed-at: REPLACE_ME_DEPLOYED_AT
    bizkit.io/deployed-by: REPLACE_ME_DEPLOYED_BY
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-api
      app.kubernetes.io/part-of: bizkit
      environment: prod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-api
        app.kubernetes.io/part-of: bizkit
        app.kubernetes.io/component: ai-api
        environment: prod
        tier: app
        network-role: internal-api
      annotations:
        bizkit.io/git-sha: REPLACE_ME_GIT_SHA
        bizkit.io/deployed-at: REPLACE_ME_DEPLOYED_AT
        bizkit.io/deployed-by: REPLACE_ME_DEPLOYED_BY
    spec:
      priorityClassName: bizkit-app-standard
      terminationGracePeriodSeconds: 30
      nodeSelector:
        nodepool: app-pool
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: ai-api
              app.kubernetes.io/part-of: bizkit
              environment: prod
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: ai-api
                    app.kubernetes.io/part-of: bizkit
                    environment: prod
      containers:
        - name: ai-api
          image: REPLACE_ME_AI_API_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - secretRef:
                name: ai-api-secret
          readinessProbe:
            httpGet:
              path: /ai/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 30
            periodSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          resources:
            requests:
              cpu: 500m
              memory: 800Mi
            limits:
              cpu: 1200m
              memory: 1536Mi
