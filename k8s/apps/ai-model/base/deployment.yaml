apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-model
  namespace: prod-ai
  labels:
    app.kubernetes.io/name: ai-model
    app.kubernetes.io/part-of: bizkit
    app.kubernetes.io/component: ai-model
    environment: prod
    tier: app
    network-role: model
  annotations:
    bizkit.io/git-sha: REPLACE_ME_GIT_SHA
    bizkit.io/deployed-at: REPLACE_ME_DEPLOYED_AT
    bizkit.io/deployed-by: REPLACE_ME_DEPLOYED_BY
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-model
      app.kubernetes.io/part-of: bizkit
      environment: prod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-model
        app.kubernetes.io/part-of: bizkit
        app.kubernetes.io/component: ai-model
        environment: prod
        tier: app
        network-role: model
      annotations:
        bizkit.io/git-sha: REPLACE_ME_GIT_SHA
        bizkit.io/deployed-at: REPLACE_ME_DEPLOYED_AT
        bizkit.io/deployed-by: REPLACE_ME_DEPLOYED_BY
    spec:
      priorityClassName: bizkit-ai-batch
      terminationGracePeriodSeconds: 60
      nodeSelector:
        nodepool: ai-serving-pool
      tolerations:
        - key: dedicated
          operator: Equal
          value: model
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: ai-model
              app.kubernetes.io/part-of: bizkit
              environment: prod
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nodepool
                    operator: In
                    values: ["ai-serving-pool"]
                  - key: dedicated
                    operator: In
                    values: ["model"]
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: ai-model
                    app.kubernetes.io/part-of: bizkit
                    environment: prod
      containers:
        - name: ai-model
          image: REPLACE_ME_AI_MODEL_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          envFrom:
            - secretRef:
                name: ai-model-secret
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 60
            periodSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
          resources:
            requests:
              cpu: 800m
              memory: 2Gi
            limits:
              cpu: 1800m
              memory: 4Gi
