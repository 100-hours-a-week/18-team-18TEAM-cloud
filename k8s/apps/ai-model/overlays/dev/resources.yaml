apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-model
  namespace: dev
  labels:
    app.kubernetes.io/name: ai-model
    app.kubernetes.io/part-of: bizkit
    app.kubernetes.io/component: ai-model
    environment: dev
    tier: app
    network-role: model
  annotations:
    bizkit.io/git-sha: REPLACE_ME_GIT_SHA
    bizkit.io/deployed-at: REPLACE_ME_DEPLOYED_AT
    bizkit.io/deployed-by: REPLACE_ME_DEPLOYED_BY
spec:
  replicas: 0
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-model
      app.kubernetes.io/part-of: bizkit
      environment: dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-model
        app.kubernetes.io/part-of: bizkit
        app.kubernetes.io/component: ai-model
        environment: dev
        tier: app
        network-role: model
      annotations:
        bizkit.io/git-sha: REPLACE_ME_GIT_SHA
        bizkit.io/deployed-at: REPLACE_ME_DEPLOYED_AT
        bizkit.io/deployed-by: REPLACE_ME_DEPLOYED_BY
    spec:
      priorityClassName: bizkit-ai-batch
      terminationGracePeriodSeconds: 60
      nodeSelector:
        node-pool: dev
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: ai-model
              app.kubernetes.io/part-of: bizkit
              environment: dev
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: ai-model
                    app.kubernetes.io/part-of: bizkit
                    environment: dev
      containers:
        - name: ai-model
          image: 027929308165.dkr.ecr.ap-northeast-2.amazonaws.com/bizkit-ai-dev:dev-1.0.0-d9a8ef3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          envFrom:
            - secretRef:
                name: ai-model-secret
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 60
            periodSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
          resources:
            requests:
              cpu: 800m
              memory: 2Gi
            limits:
              cpu: 1800m
              memory: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ai-model
  namespace: dev
  labels:
    app.kubernetes.io/name: ai-model
    app.kubernetes.io/part-of: bizkit
    app.kubernetes.io/component: ai-model
    environment: dev
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ai-model
    app.kubernetes.io/part-of: bizkit
    environment: dev
  ports:
    - name: http
      port: 8001
      targetPort: 8001
      protocol: TCP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ai-model
  namespace: dev
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-model
      app.kubernetes.io/part-of: bizkit
      environment: dev
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ai-model-secret
  namespace: dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bizkit-cluster-secret-store
  target:
    name: ai-model-secret
    creationPolicy: Owner
  data:
    - secretKey: APP_ENV
      remoteRef:
        key: dev/ai-model
        property: APP_ENV
    - secretKey: VLLM_BASE_URL
      remoteRef:
        key: dev/ai-model
        property: VLLM_BASE_URL
    - secretKey: VLM_BASE_URL
      remoteRef:
        key: dev/ai-model
        property: VLM_BASE_URL
    - secretKey: RUNPOD_API_KEY
      remoteRef:
        key: dev/ai-model
        property: RUNPOD_API_KEY
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: dev/ai-model
        property: GITHUB_TOKEN
    - secretKey: TAVILY_API_KEY
      remoteRef:
        key: dev/ai-model
        property: TAVILY_API_KEY
    - secretKey: REDIS_URL
      remoteRef:
        key: dev/ai-model
        property: REDIS_URL
    - secretKey: EMBEDDING_SERVICE_URL
      remoteRef:
        key: dev/ai-model
        property: EMBEDDING_SERVICE_URL
    - secretKey: MILVUS_URI
      remoteRef:
        key: dev/ai-model
        property: MILVUS_URI
    - secretKey: MILVUS_TOKEN
      remoteRef:
        key: dev/ai-model
        property: MILVUS_TOKEN
