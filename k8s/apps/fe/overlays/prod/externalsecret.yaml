apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: fe-secret
  namespace: prod-fe
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bizkit-cluster-secret-store
  target:
    name: fe-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: prod/fe
