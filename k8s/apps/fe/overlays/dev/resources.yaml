apiVersion: apps/v1
kind: Deployment
metadata:
  name: fe
  namespace: dev
  labels:
    app.kubernetes.io/name: fe
    app.kubernetes.io/part-of: bizkit
    app.kubernetes.io/component: frontend
    environment: dev
    tier: app
    network-role: public-entry
  annotations:
    bizkit.io/git-sha: d8def4587b4bae7f1792e64ef48abfc0c1bc90c1
    bizkit.io/deployed-at: 2026-03-19T13:37:43Z
    bizkit.io/deployed-by: yeiin
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fe
      app.kubernetes.io/part-of: bizkit
      environment: dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fe
        app.kubernetes.io/part-of: bizkit
        app.kubernetes.io/component: frontend
        environment: dev
        tier: app
        network-role: public-entry
      annotations:
        bizkit.io/git-sha: d8def4587b4bae7f1792e64ef48abfc0c1bc90c1
        bizkit.io/deployed-at: 2026-03-19T13:37:43Z
        bizkit.io/deployed-by: yeiin
    spec:
      priorityClassName: bizkit-app-standard
      terminationGracePeriodSeconds: 30
      nodeSelector:
        node-pool: dev
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: fe
              app.kubernetes.io/part-of: bizkit
              environment: dev
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: fe
                    app.kubernetes.io/part-of: bizkit
                    environment: dev
      containers:
        - name: fe
          image: 027929308165.dkr.ecr.ap-northeast-2.amazonaws.com/bizkit-fe-dev:dev-1.7.0-dev.3-d8def45
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - secretRef:
                name: fe-secret
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: fe
  namespace: dev
  labels:
    app.kubernetes.io/name: fe
    app.kubernetes.io/part-of: bizkit
    app.kubernetes.io/component: frontend
    environment: dev
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: fe
    app.kubernetes.io/part-of: bizkit
    environment: dev
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fe
  namespace: dev
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fe
      app.kubernetes.io/part-of: bizkit
      environment: dev
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: fe-secret
  namespace: dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bizkit-cluster-secret-store
  target:
    name: fe-secret
    creationPolicy: Owner
    template:
      mergePolicy: Merge
      data:
        SPRING_API_BASE_URL: http://be.dev.svc.cluster.local:8080/api
        AI_API_BASE_URL: http://ai-api.dev.svc.cluster.local:8000
  data:
    - secretKey: APP_ENV
      remoteRef:
        key: dev/fe
        property: APP_ENV
    - secretKey: REDIS_URL
      remoteRef:
        key: dev/fe
        property: REDIS_URL
    - secretKey: REDIS_NAMESPACE
      remoteRef:
        key: dev/fe
        property: REDIS_NAMESPACE
    - secretKey: SESSION_COOKIE_SECURE
      remoteRef:
        key: dev/fe
        property: SESSION_COOKIE_SECURE
    - secretKey: SESSION_TTL_SECONDS
      remoteRef:
        key: dev/fe
        property: SESSION_TTL_SECONDS
    - secretKey: MAX_SESSION_LIFETIME
      remoteRef:
        key: dev/fe
        property: MAX_SESSION_LIFETIME
    - secretKey: MIN_ROTATION_INTERVAL
      remoteRef:
        key: dev/fe
        property: MIN_ROTATION_INTERVAL
    - secretKey: SENTRY_DSN
      remoteRef:
        key: dev/fe
        property: SENTRY_DSN
    - secretKey: SENTRY_ENVIRONMENT
      remoteRef:
        key: dev/fe
        property: SENTRY_ENVIRONMENT
