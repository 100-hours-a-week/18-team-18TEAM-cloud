apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fe
  namespace: prod-fe
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fe
  minReplicas: 4
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
