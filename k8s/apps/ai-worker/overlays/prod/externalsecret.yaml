apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ai-worker-secret
  namespace: prod-ai
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bizkit-cluster-secret-store
  target:
    name: ai-worker-secret
    creationPolicy: Owner
  data:
    - secretKey: APP_ENV
      remoteRef:
        key: prod/ai-worker
        property: APP_ENV
    - secretKey: VLLM_BASE_URL
      remoteRef:
        key: prod/ai-worker
        property: VLLM_BASE_URL
    - secretKey: VLM_BASE_URL
      remoteRef:
        key: prod/ai-worker
        property: VLM_BASE_URL
    - secretKey: RUNPOD_API_KEY
      remoteRef:
        key: prod/ai-worker
        property: RUNPOD_API_KEY
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: prod/ai-worker
        property: GITHUB_TOKEN
    - secretKey: TAVILY_API_KEY
      remoteRef:
        key: prod/ai-worker
        property: TAVILY_API_KEY
    - secretKey: TAVILY_API_KEY_2
      remoteRef:
        key: prod/ai-worker
        property: TAVILY_API_KEY_2
    - secretKey: REDIS_URL
      remoteRef:
        key: prod/ai-worker
        property: REDIS_URL
    - secretKey: EMBEDDING_SERVICE_URL
      remoteRef:
        key: prod/ai-worker
        property: EMBEDDING_SERVICE_URL
    - secretKey: MILVUS_URI
      remoteRef:
        key: prod/ai-worker
        property: MILVUS_URI
    - secretKey: MILVUS_TOKEN
      remoteRef:
        key: prod/ai-worker
        property: MILVUS_TOKEN
