apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-worker-allow-required-traffic
  namespace: prod-ai
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ai-worker
      app.kubernetes.io/part-of: bizkit
      environment: prod
  policyTypes:
    - Ingress
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: prod-ai
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ai-model
              app.kubernetes.io/part-of: bizkit
              environment: prod
      ports:
        - protocol: TCP
          port: 8001
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: prod-data
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
