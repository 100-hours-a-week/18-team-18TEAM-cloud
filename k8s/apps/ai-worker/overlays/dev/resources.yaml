apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-worker
  namespace: dev
  labels:
    app.kubernetes.io/name: ai-worker
    app.kubernetes.io/part-of: bizkit
    app.kubernetes.io/component: ai-worker
    environment: dev
    tier: app
    network-role: worker
  annotations:
    bizkit.io/git-sha: REPLACE_ME_GIT_SHA
    bizkit.io/deployed-at: REPLACE_ME_DEPLOYED_AT
    bizkit.io/deployed-by: REPLACE_ME_DEPLOYED_BY
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-worker
      app.kubernetes.io/part-of: bizkit
      environment: dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-worker
        app.kubernetes.io/part-of: bizkit
        app.kubernetes.io/component: ai-worker
        environment: dev
        tier: app
        network-role: worker
      annotations:
        bizkit.io/git-sha: REPLACE_ME_GIT_SHA
        bizkit.io/deployed-at: REPLACE_ME_DEPLOYED_AT
        bizkit.io/deployed-by: REPLACE_ME_DEPLOYED_BY
    spec:
      priorityClassName: bizkit-ai-batch
      terminationGracePeriodSeconds: 60
      nodeSelector:
        node-pool: dev
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: ai-worker
              app.kubernetes.io/part-of: bizkit
              environment: dev
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: ai-worker
                    app.kubernetes.io/part-of: bizkit
                    environment: dev
      containers:
        - name: ai-worker
          image: 027929308165.dkr.ecr.ap-northeast-2.amazonaws.com/bizkit-ai-dev:dev-1.0.0-af51b64
          imagePullPolicy: Always
          command:
            - python
            - run_worker.py
          envFrom:
            - secretRef:
                name: ai-worker-secret
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -lc
                  - |
                    mkdir -p /app/fonts
                    ln -sf /usr/share/fonts/truetype/nanum/NanumGothic.ttf /app/fonts/NanumGothic-Regular.ttf
                    ln -sf /usr/share/fonts/truetype/nanum/NanumGothicBold.ttf /app/fonts/NanumGothic-Bold.ttf
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 700m
              memory: 896Mi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ai-worker
  namespace: dev
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-worker
      app.kubernetes.io/part-of: bizkit
      environment: dev
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ai-worker-secret
  namespace: dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bizkit-cluster-secret-store
  target:
    name: ai-worker-secret
    creationPolicy: Owner
  data:
    - secretKey: APP_ENV
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: dev/ai-worker
        property: APP_ENV
    - secretKey: VLLM_BASE_URL
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: dev/ai-worker
        property: VLLM_BASE_URL
    - secretKey: VLM_BASE_URL
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: dev/ai-worker
        property: VLM_BASE_URL
    - secretKey: RUNPOD_API_KEY
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: dev/ai-worker
        property: RUNPOD_API_KEY
    - secretKey: GITHUB_TOKEN
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: dev/ai-worker
        property: GITHUB_TOKEN
    - secretKey: TAVILY_API_KEY
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: dev/ai-worker
        property: TAVILY_API_KEY
    - secretKey: TAVILY_API_KEY_2
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: dev/ai-worker
        property: TAVILY_API_KEY_2
    - secretKey: RUNPOD_ENDPOINT_ID
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: dev/ai-worker
        property: RUNPOD_ENDPOINT_ID
    - secretKey: REDIS_URL
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: dev/fe
        property: REDIS_URL
    - secretKey: EMBEDDING_SERVICE_URL
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: dev/ai-worker
        property: EMBEDDING_SERVICE_URL
    - secretKey: MILVUS_URI
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: dev/ai-worker
        property: MILVUS_URI
    - secretKey: MILVUS_TOKEN
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: dev/ai-worker
        property: MILVUS_TOKEN
