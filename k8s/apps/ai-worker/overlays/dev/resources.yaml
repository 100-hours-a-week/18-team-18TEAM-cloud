apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-worker
  namespace: dev
  labels:
    app.kubernetes.io/name: ai-worker
    app.kubernetes.io/part-of: bizkit
    app.kubernetes.io/component: ai-worker
    environment: dev
    tier: app
    network-role: worker
  annotations:
    bizkit.io/git-sha: REPLACE_ME_GIT_SHA
    bizkit.io/deployed-at: REPLACE_ME_DEPLOYED_AT
    bizkit.io/deployed-by: REPLACE_ME_DEPLOYED_BY
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-worker
      app.kubernetes.io/part-of: bizkit
      environment: dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-worker
        app.kubernetes.io/part-of: bizkit
        app.kubernetes.io/component: ai-worker
        environment: dev
        tier: app
        network-role: worker
      annotations:
        bizkit.io/git-sha: REPLACE_ME_GIT_SHA
        bizkit.io/deployed-at: REPLACE_ME_DEPLOYED_AT
        bizkit.io/deployed-by: REPLACE_ME_DEPLOYED_BY
    spec:
      priorityClassName: bizkit-ai-batch
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      terminationGracePeriodSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: ai-worker
              app.kubernetes.io/part-of: bizkit
              environment: dev
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: ai-worker
                    app.kubernetes.io/part-of: bizkit
                    environment: dev
      containers:
        - name: ai-worker
          image: 027929308165.dkr.ecr.ap-northeast-2.amazonaws.com/bizkit-ai-dev:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: ai-worker-secret
          resources:
            requests:
              cpu: 400m
              memory: 700Mi
            limits:
              cpu: 1000m
              memory: 1228Mi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ai-worker
  namespace: dev
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-worker
      app.kubernetes.io/part-of: bizkit
      environment: dev
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ai-worker-secret
  namespace: dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bizkit-cluster-secret-store
  target:
    name: ai-worker-secret
    creationPolicy: Owner
  data:
    - secretKey: APP_ENV
      remoteRef:
        key: dev/ai-worker
        property: APP_ENV
    - secretKey: VLLM_BASE_URL
      remoteRef:
        key: dev/ai-worker
        property: VLLM_BASE_URL
    - secretKey: VLM_BASE_URL
      remoteRef:
        key: dev/ai-worker
        property: VLM_BASE_URL
    - secretKey: RUNPOD_API_KEY
      remoteRef:
        key: dev/ai-worker
        property: RUNPOD_API_KEY
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: dev/ai-worker
        property: GITHUB_TOKEN
    - secretKey: TAVILY_API_KEY
      remoteRef:
        key: dev/ai-worker
        property: TAVILY_API_KEY
    - secretKey: REDIS_URL
      remoteRef:
        key: dev/ai-worker
        property: REDIS_URL
    - secretKey: EMBEDDING_SERVICE_URL
      remoteRef:
        key: dev/ai-worker
        property: EMBEDDING_SERVICE_URL
    - secretKey: MILVUS_URI
      remoteRef:
        key: dev/ai-worker
        property: MILVUS_URI
    - secretKey: MILVUS_TOKEN
      remoteRef:
        key: dev/ai-worker
        property: MILVUS_TOKEN
