apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-worker
  namespace: prod-ai
  labels:
    app.kubernetes.io/name: ai-worker
    app.kubernetes.io/part-of: bizkit
    app.kubernetes.io/component: ai-worker
    environment: prod
    tier: app
    network-role: worker
  annotations:
    bizkit.io/git-sha: REPLACE_ME_GIT_SHA
    bizkit.io/deployed-at: REPLACE_ME_DEPLOYED_AT
    bizkit.io/deployed-by: REPLACE_ME_DEPLOYED_BY
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-worker
      app.kubernetes.io/part-of: bizkit
      environment: prod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-worker
        app.kubernetes.io/part-of: bizkit
        app.kubernetes.io/component: ai-worker
        environment: prod
        tier: app
        network-role: worker
      annotations:
        bizkit.io/git-sha: REPLACE_ME_GIT_SHA
        bizkit.io/deployed-at: REPLACE_ME_DEPLOYED_AT
        bizkit.io/deployed-by: REPLACE_ME_DEPLOYED_BY
    spec:
      priorityClassName: bizkit-ai-batch
      terminationGracePeriodSeconds: 60
      nodeSelector:
        node-pool: ai-pool
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: ai-worker
              app.kubernetes.io/part-of: bizkit
              environment: prod
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: ai-worker
                    app.kubernetes.io/part-of: bizkit
                    environment: prod
      containers:
        - name: ai-worker
          image: 027929308165.dkr.ecr.ap-northeast-2.amazonaws.com/bizkit-ai-prod:prod-1.0.0-deea488-11-1
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: ai-worker-secret
          resources:
            requests:
              cpu: 400m
              memory: 700Mi
            limits:
              cpu: 1000m
              memory: 1228Mi
