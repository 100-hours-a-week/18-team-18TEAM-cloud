# AI Worker는 큐 적체 기반 KEDA가 목표다. stream 이름과 threshold는 운영 기준 합의 후 최종 확정한다.

apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ai-worker
  labels:
    app.kubernetes.io/name: ai-worker
    app.kubernetes.io/part-of: bizkit
spec:
  scaleTargetRef:
    name: ai-worker
  minReplicaCount: 1
  maxReplicaCount: 4
  pollingInterval: 15
  cooldownPeriod: 120
  triggers:
    - type: redis-streams
      metadata:
        addressFromEnv: REDIS_URL
        stream: TODO_TASK_STREAM # TODO(B): tasks:job / tasks:hex / tasks:ocr 처리 구조에 맞춰 분리 또는 다중 trigger 구성
        consumerGroup: ai-workers
        pendingEntriesCount: "50" # TODO(A+B): backlog 기준으로 최종 확정
