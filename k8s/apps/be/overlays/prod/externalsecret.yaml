apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: be-secret
  namespace: prod-be
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bizkit-cluster-secret-store
  target:
    name: be-secret
    creationPolicy: Owner
  data:
    - secretKey: APP_ENV
      remoteRef:
        key: prod/be
        property: APP_ENV
    - secretKey: SPRING_DATASOURCE_URL
      remoteRef:
        key: prod/be
        property: SPRING_DATASOURCE_URL
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef:
        key: prod/be
        property: SPRING_DATASOURCE_USERNAME
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: prod/be
        property: SPRING_DATASOURCE_PASSWORD
    - secretKey: SPRING_DATASOURCE_DRIVER
      remoteRef:
        key: prod/be
        property: SPRING_DATASOURCE_DRIVER
    - secretKey: REDIS_HOST
      remoteRef:
        key: prod/be
        property: REDIS_HOST
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: prod/be
        property: REDIS_PASSWORD
    - secretKey: SPRING_PROFILES_ACTIVE
      remoteRef:
        key: prod/be
        property: SPRING_PROFILES_ACTIVE
    - secretKey: SPRING_JPA_HIBERNATE_DDL_AUTO
      remoteRef:
        key: prod/be
        property: SPRING_JPA_HIBERNATE_DDL_AUTO
    - secretKey: KAKAO_CLIENT_ID
      remoteRef:
        key: prod/be
        property: KAKAO_CLIENT_ID
    - secretKey: KAKAO_CLIENT_SECRET
      remoteRef:
        key: prod/be
        property: KAKAO_CLIENT_SECRET
    - secretKey: KAKAO_REDIRECT_URIS
      remoteRef:
        key: prod/be
        property: KAKAO_REDIRECT_URIS
    - secretKey: KAKAO_ADMIN_KEY
      remoteRef:
        key: prod/be
        property: KAKAO_ADMIN_KEY
    - secretKey: JWT_SECRET
      remoteRef:
        key: prod/be
        property: JWT_SECRET
    - secretKey: JWT_ACCESS_TOKEN_VALIDITY_SECONDS
      remoteRef:
        key: prod/be
        property: JWT_ACCESS_TOKEN_VALIDITY_SECONDS
    - secretKey: JWT_REFRESH_TOKEN_VALIDITY_SECONDS
      remoteRef:
        key: prod/be
        property: JWT_REFRESH_TOKEN_VALIDITY_SECONDS
    - secretKey: CORS_ALLOWED_ORIGINS
      remoteRef:
        key: prod/be
        property: CORS_ALLOWED_ORIGINS
    - secretKey: COOKIE_SECURE
      remoteRef:
        key: prod/be
        property: COOKIE_SECURE
    - secretKey: COOKIE_SAME_SITE
      remoteRef:
        key: prod/be
        property: COOKIE_SAME_SITE
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: prod/be
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: prod/be
        property: AWS_SECRET_ACCESS_KEY
    - secretKey: AWS_REGION
      remoteRef:
        key: prod/be
        property: AWS_REGION
    - secretKey: AWS_S3_BUCKET
      remoteRef:
        key: prod/be
        property: AWS_S3_BUCKET
    - secretKey: AWS_S3_PRESIGNED_URL_EXPIRATION_SECONDS
      remoteRef:
        key: prod/be
        property: AWS_S3_PRESIGNED_URL_EXPIRATION_SECONDS
    - secretKey: AI_SERVER_URL
      remoteRef:
        key: prod/be
        property: AI_SERVER_URL
    - secretKey: AI_TIMEOUT_SECONDS
      remoteRef:
        key: prod/be
        property: AI_TIMEOUT_SECONDS
    - secretKey: METRICS_DENY_URI_LIST
      remoteRef:
        key: prod/be
        property: METRICS_DENY_URI_LIST
