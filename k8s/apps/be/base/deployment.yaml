apiVersion: apps/v1
kind: Deployment
metadata:
  name: be
  namespace: prod-be
  labels:
    app.kubernetes.io/name: be
    app.kubernetes.io/part-of: bizkit
    app.kubernetes.io/component: backend
    environment: prod
    tier: app
    network-role: internal-api
  annotations:
    bizkit.io/git-sha: REPLACE_ME_GIT_SHA
    bizkit.io/deployed-at: REPLACE_ME_DEPLOYED_AT
    bizkit.io/deployed-by: REPLACE_ME_DEPLOYED_BY
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: be
      app.kubernetes.io/part-of: bizkit
      environment: prod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: be
        app.kubernetes.io/part-of: bizkit
        app.kubernetes.io/component: backend
        environment: prod
        tier: app
        network-role: internal-api
      annotations:
        bizkit.io/git-sha: REPLACE_ME_GIT_SHA
        bizkit.io/deployed-at: REPLACE_ME_DEPLOYED_AT
        bizkit.io/deployed-by: REPLACE_ME_DEPLOYED_BY
    spec:
      priorityClassName: bizkit-app-standard
      terminationGracePeriodSeconds: 30
      nodeSelector:
        node-pool: app-pool
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: be
              app.kubernetes.io/part-of: bizkit
              environment: prod
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: be
                    app.kubernetes.io/part-of: bizkit
                    environment: prod
      containers:
        - name: be
          image: REPLACE_ME_BE_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - secretRef:
                name: be-secret
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          resources:
            requests:
              cpu: 700m
              memory: 1200Mi
            limits:
              cpu: 1500m
              memory: 2Gi
