apiVersion: apps/v1
kind: Deployment
metadata:
  name: be
  labels:
    app.kubernetes.io/name: be
    app.kubernetes.io/part-of: bizkit
    app.kubernetes.io/component: backend
spec:
  replicas: 2 # BE는 최소 2개 replica로 시작해 단일 노드 편중을 피한다
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0 # 핵심 트래픽 계층이라 롤링 중에도 기존 replica를 유지한다
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: be
  template:
    metadata:
      labels:
        app.kubernetes.io/name: be
        app.kubernetes.io/part-of: bizkit
        app.kubernetes.io/component: backend
    spec:
      terminationGracePeriodSeconds: 40 # Spring 종료 훅과 LB 제외 시간을 확보한다
      containers:
        - name: be
          image: REPLACE_BE_IMAGE # overlay 또는 배포 파이프라인에서 실제 ECR 이미지로 치환
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: APP_NAME
              value: "be"
          envFrom:
            - secretRef:
                name: be-env
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 700m
              memory: 1200Mi
            limits:
              cpu: 1500m
              memory: 2Gi
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - sleep 20
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: be
      # TODO(A+B): app-pool 라벨/taint 규칙이 확정되면 nodeAffinity / tolerations 추가
